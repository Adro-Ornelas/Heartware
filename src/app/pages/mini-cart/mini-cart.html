<div class="fixed bottom-6 right-6 z-50">

  <!-- BOTÓN -->
  <div 
    (click)="toggle()"
    class="bg-red-500 text-white rounded-full w-14 h-14 flex items-center justify-center shadow-lg cursor-pointer relative hover:scale-105 transition">

    <i class="pi pi-shopping-cart text-xl"></i>

    <!-- badge -->
    <span 
      *ngIf="totalItems() > 0"
      class="absolute -top-2 -right-2 bg-black text-white text-xs px-2 py-1 rounded-full">
      {{ totalItems() }}
    </span>
  </div>

  <!-- expanded panel -->
  <div 
    *ngIf="expanded"
    class="mt-3 w-72 bg-white dark:bg-surface-900 rounded-xl shadow-xl p-4 animate-fadeIn">

    <h3 class="font-semibold mb-3">Carrito</h3>

    <!-- list -->
    <div class="flex flex-col gap-2 max-h-48 overflow-auto">

      <div *ngFor="let item of cart.products()" 
           class="flex justify-between text-sm">

        <span class="truncate w-32">
          {{ item.name }}
        </span>

        <span>
          x{{ item.quantity }}
        </span>

      </div>

    </div>

    <!-- total -->
    <div class="border-t mt-3 mb-3 pt-2 flex justify-between font-semibold">
      <span>Total</span>
      <span>$ {{ cart.total() }}</span>
    </div>

    <!-- button -->
    <p-button 
      label="Ver carrito"
      class="w-full mt-3"
      (onClick)="goToCart()">
    </p-button>

  </div>

</div>
